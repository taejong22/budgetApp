name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=budget --cov-fail-under=100

      - name: Enforce cyclomatic complexity
        run: xenon --max-absolute B --max-average B --max-modules B budget

      - name: Run style checks
        run: flake8 budget tests
